        const prevText = `Раздел X. ОХРАНА ТРУДА

Глава 33. ОБЩИЕ ПОЛОЖЕНИЯ

Статья 209. Основные понятия

Охрана труда - система сохранения жизни и здоровья работников в процессе трудовой деятельности, включающая в себя правовые, социально-экономические, организационно-технические, санитарно-гигиенические, лечебно-профилактические, реабилитационные и иные мероприятия.

Условия труда - совокупность факторов производственной среды и трудового процесса, оказывающих влияние на работоспособность и здоровье работника.

Вредный производственный фактор - производственный фактор, воздействие которого на работника может привести к его заболеванию.

Опасный производственный фактор - производственный фактор, воздействие которого на работника может привести к его травме.

Безопасные условия труда - условия труда, при которых воздействие на работающих вредных и (или) опасных производственных факторов исключено либо уровни их воздействия не превышают установленных нормативов.

Рабочее место - место, где работник должен находиться или куда ему необходимо прибыть в связи с его работой и которое прямо или косвенно находится под контролем работодателя.

Средства индивидуальной и коллективной защиты работников - технические средства, используемые для предотвращения или уменьшения воздействия на работников вредных и (или) опасных производственных факторов, а также для защиты от загрязнения.

Система управления охраной труда - комплекс взаимосвязанных и взаимодействующих между собой элементов, устанавливающих политику и цели в области охраны труда у конкретного работодателя и процедуры по достижению этих целей. Типовое положение о системе управления охраной труда утверждается федеральным органом исполнительной власти, осуществляющим функции по выработке государственной политики и нормативно-правовому регулированию в сфере труда, с учетом мнения Российской трехсторонней комиссии по регулированию социально-трудовых отношений. (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

Производственная деятельность - совокупность действий работников с применением средств труда, необходимых для превращения ресурсов в готовую продукцию, включающих в себя производство и переработку различных видов сырья, строительство, оказание различных видов услуг.

Требования охраны труда - государственные нормативные требования охраны труда, в том числе стандарты безопасности труда, а также требования охраны труда, установленные правилами и инструкциями по охране труда. (Часть введена - Федеральный закон от 30.06.2006 № 90-ФЗ; в редакции Федерального закона от 24.07.2009 № 206-ФЗ)

Государственная экспертиза условий труда - оценка соответствия объекта экспертизы государственным нормативным требованиям охраны труда. (Часть введена - Федеральный закон от 30.06.2006 № 90-ФЗ)

(Часть введена - Федеральный закон от 30.06.2006 № 90-ФЗ; утратила силу - Федеральный закон от 28.12.2013 № 421-ФЗ)

Стандарты безопасности труда - правила, процедуры, критерии и нормативы, направленные на сохранение жизни и здоровья работников в процессе трудовой деятельности и регламентирующие осуществление социально-экономических, организационных, санитарно-гигиенических, лечебно-профилактических, реабилитационных мер в области охраны труда. (Часть введена - Федеральный закон от 24.07.2009 № 206-ФЗ)

Профессиональный риск - вероятность причинения вреда здоровью в результате воздействия вредных и (или) опасных производственных факторов при исполнении работником обязанностей по трудовому договору или в иных случаях, установленных настоящим Кодексом, другими федеральными законами. Порядок оценки уровня профессионального риска устанавливается федеральным органом исполнительной власти, осуществляющим функции по выработке государственной политики и нормативно-правовому регулированию в сфере труда с учетом мнения Российской трехсторонней комиссии по регулированию социально-трудовых отношений. (Часть введена - Федеральный закон от 18.07.2011 № 238-ФЗ)

Управление профессиональными рисками - комплекс взаимосвязанных мероприятий, являющихся элементами системы управления охраной труда и включающих в себя меры по выявлению, оценке и снижению уровней профессиональных рисков. (Часть введена - Федеральный закон от 18.07.2011 № 238-ФЗ; в редакции Федерального закона от 28.12.2013 № 421-ФЗ)

Статья 209^1^. Основные принципы обеспечения безопасности труда

Основными принципами обеспечения безопасности труда являются:

предупреждение и профилактика опасностей;

минимизация повреждения здоровья работников.

Принцип предупреждения и профилактики опасностей означает, что работодатель систематически должен реализовывать мероприятия по улучшению условий труда, включая ликвидацию или снижение уровней профессиональных рисков или недопущение повышения их уровней, с соблюдением приоритетности реализации таких мероприятий.

Принцип минимизации повреждения здоровья работников означает, что работодателем должны быть предусмотрены меры, обеспечивающие постоянную готовность к локализации (минимизации) и ликвидации последствий реализации профессиональных рисков.

Приоритетность реализации мероприятий по улучшению условий и охраны труда, ликвидации или снижению уровней профессиональных рисков либо недопущению повышения их уровней устанавливается в примерном перечне, указанном в части третьей статьи 225 настоящего Кодекса.

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 210. Основные направления государственной политики в области охраны труда

Основными направлениями государственной политики в области охраны труда являются:

обеспечение приоритета сохранения жизни и здоровья работников;

принятие и реализация федеральных законов и иных нормативных правовых актов Российской Федерации, законов и иных нормативных правовых актов субъектов Российской Федерации в области охраны труда, а также федеральных целевых, ведомственных целевых и территориальных целевых программ улучшения условий и охраны труда;

государственное управление охраной труда;

федеральный государственный контроль (надзор) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права, включающий в себя проведение проверок соблюдения государственных нормативных требований охраны труда; (В редакции федеральных законов от 18.07.2011 № 242-ФЗ, от 28.06.2021 № 220-ФЗ)

государственная экспертиза условий труда;

установление порядка проведения специальной оценки условий труда и экспертизы качества проведения специальной оценки условий труда; (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

содействие общественному контролю за соблюдением прав и законных интересов работников в области охраны труда;

профилактика несчастных случаев и повреждения здоровья работников;

расследование и учет несчастных случаев на производстве и профессиональных заболеваний;

защита законных интересов работников, пострадавших от несчастных случаев на производстве и профессиональных заболеваний, а также членов их семей на основе обязательного социального страхования работников от несчастных случаев на производстве и профессиональных заболеваний;

установление гарантий и компенсаций за работу с вредными и (или) опасными условиями труда; (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

координация деятельности в области охраны труда, охраны окружающей среды и других видов экономической и социальной деятельности; (В редакции Федерального закона от 30.12.2008 № 309-ФЗ)

распространение передового отечественного и зарубежного опыта работы по улучшению условий и охраны труда;

участие государства в финансировании мероприятий по охране труда;

подготовка специалистов по охране труда и их дополнительное профессиональное образование; (В редакции Федерального закона от 02.07.2013 № 185-ФЗ)

организация государственной статистической отчетности об условиях труда, а также о производственном травматизме, профессиональной заболеваемости и об их материальных последствиях;

обеспечение функционирования единой информационной системы охраны труда;

международное сотрудничество в области охраны труда;

проведение эффективной налоговой политики, стимулирующей создание безопасных условий труда, разработку и внедрение безопасных техники и технологий, производство средств индивидуальной и коллективной защиты работников;

установление порядка обеспечения работников средствами индивидуальной и коллективной защиты, а также санитарно-бытовыми помещениями и устройствами, лечебно-профилактическими средствами за счет средств работодателей.

(Часть в редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Реализация основных направлений государственной политики в области охраны труда обеспечивается согласованными действиями органов государственной власти Российской Федерации, органов государственной власти субъектов Российской Федерации и органов местного самоуправления, работодателей, объединений работодателей, а также профессиональных союзов, их объединений и иных уполномоченных работниками представительных органов по вопросам охраны труда.

Глава 34. ТРЕБОВАНИЯ ОХРАНЫ ТРУДА

Статья 211. Государственные нормативные требования охраны труда

Государственными нормативными требованиями охраны труда, содержащимися в федеральных законах и иных нормативных правовых актах Российской Федерации и законах и иных нормативных правовых актах субъектов Российской Федерации, устанавливаются правила, процедуры, критерии и нормативы, направленные на сохранение жизни и здоровья работников в процессе трудовой деятельности. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 24.07.2009 № 206-ФЗ)

Государственные нормативные требования охраны труда обязательны для исполнения юридическими и физическими лицами при осуществлении ими любых видов деятельности, в том числе при проектировании, строительстве (реконструкции) и эксплуатации объектов, конструировании машин, механизмов и другого оборудования, разработке технологических процессов, организации производства и труда. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Порядок разработки, утверждения и изменения подзаконных нормативных правовых актов, содержащих государственные нормативные требования охраны труда, в том числе стандарты безопасности труда, устанавливается Правительством Российской Федерации с учетом мнения Российской трехсторонней комиссии по регулированию социально-трудовых отношений. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 24.07.2009 № 206-ФЗ)

Статья 211^1^. Полномочия Правительства Российской Федерации в области охраны труда

В целях государственного управления охраной труда, а также реализации и защиты прав граждан в области охраны труда Правительство Российской Федерации:

устанавливает порядок разработки, утверждения и изменения нормативных правовых актов федеральных органов исполнительной власти, содержащих государственные нормативные требования охраны труда;

устанавливает порядок обучения по охране труда и проверки знания требований охраны труда, а также требования к организациям, оказывающим услуги по проведению обучения по охране труда;

устанавливает порядок расследования и учета случаев профессиональных заболеваний работников;

организует взаимодействие федеральных органов исполнительной власти, органов исполнительной власти субъектов Российской Федерации, объединений работодателей, профессиональных союзов и их объединений, а также иных общественных объединений в сфере охраны труда по вопросам реализации государственной политики в области охраны труда;

осуществляет иные полномочия в области охраны труда, предусмотренные настоящим Кодексом, иными федеральными законами, нормативными правовыми актами Президента Российской Федерации.

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 211^2^. Полномочия федеральных органов исполнительной власти в области охраны труда

В целях государственного управления охраной труда уполномоченные федеральные органы исполнительной власти:

разрабатывают нормативные правовые акты, определяющие основы государственного управления охраной труда;

разрабатывают мероприятия по улучшению условий и охраны труда, в том числе для их включения в государственные программы Российской Федерации, и обеспечивают контроль за выполнением указанных мероприятий;

разрабатывают меры стимулирования деятельности работодателей по улучшению условий и охраны труда работников;

устанавливают основные требования к порядку разработки и содержанию правил и инструкций по охране труда, разрабатываемых работодателями;

устанавливают порядок обеспечения работников за счет средств работодателей средствами индивидуальной и коллективной защиты, а также санитарно-бытовыми помещениями и устройствами;

определяют примерный перечень, формы информационных материалов и рекомендации по их размещению работодателями в целях информирования работников об их трудовых правах, включая право на безопасные условия труда;

устанавливают порядок проведения специальной оценки условий труда;

устанавливают порядок осуществления государственной экспертизы условий труда и в случаях, предусмотренных настоящим Кодексом, проводят указанную экспертизу;

устанавливают особенности расследования несчастных случаев на производстве в отдельных отраслях и организациях, формы соответствующих документов, классификаторы, необходимые для расследования несчастных случаев на производстве, и в случаях, предусмотренных настоящим Кодексом, проводят расследования несчастных случаев на производстве или участвуют в их проведении;

организуют и координируют научно-исследовательские работы в области охраны труда и обеспечивают распространение передового отечественного и зарубежного опыта работы по улучшению условий и охраны труда;

организуют международное сотрудничество в области охраны труда;

организуют и проводят мониторинг состояния условий и охраны труда в Российской Федерации;

обеспечивают функционирование информационной системы охраны труда;

осуществляют иные полномочия в области охраны труда в соответствии с настоящим Кодексом, федеральными законами и иными нормативными правовыми актами Российской Федерации.

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 211^3^. Полномочия органов исполнительной власти субъектов Российской Федерации в области охраны труда

В целях государственного управления охраной труда орган исполнительной власти субъекта Российской Федерации в области охраны труда:

обеспечивает реализацию на территории субъекта Российской Федерации государственной политики в области охраны труда;

разрабатывает государственные программы субъекта Российской Федерации по улучшению условий и охраны труда или мероприятия по улучшению условий и охраны труда для их включения в государственные программы субъекта Российской Федерации, обеспечивает контроль за выполнением указанных программ, мероприятий и достижением показателей их эффективности и результативности;

координирует проведение на территории субъекта Российской Федерации в установленном порядке обучения по охране труда;

осуществляет на территории субъекта Российской Федерации в установленном порядке государственную экспертизу условий труда;

организует и проводит мониторинг состояния условий и охраны труда у работодателей, осуществляющих деятельность на территории субъекта Российской Федерации;

исполняет иные полномочия в области охраны труда, не отнесенные к полномочиям федеральных органов государственной власти, в соответствии с настоящим Кодексом, федеральными законами, законами и иными нормативными правовыми актами субъекта Российской Федерации.

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 212. Обязанности работодателя по обеспечению безопасных условий и охраны труда

Обязанности по обеспечению безопасных условий и охраны труда возлагаются на работодателя. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Работодатель обязан обеспечить:

безопасность работников при эксплуатации зданий, сооружений, оборудования, осуществлении технологических процессов, а также применяемых в производстве инструментов, сырья и материалов;

создание и функционирование системы управления охраной труда; (Абзац введен - Федеральный закон от 28.12.2013 № 421-ФЗ)

применение прошедших обязательную сертификацию или декларирование соответствия в установленном законодательством Российской Федерации о техническом регулировании порядке средств индивидуальной и коллективной защиты работников; (В редакции Федерального закона от 30.12.2008 № 313-ФЗ)

соответствующие требованиям охраны труда условия труда на каждом рабочем месте;

режим труда и отдыха работников в соответствии с трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права; (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

приобретение и выдачу за счет собственных средств специальной одежды, специальной обуви и других средств индивидуальной защиты, смывающих и обезвреживающих средств, прошедших обязательную сертификацию или декларирование соответствия в установленном законодательством Российской Федерации о техническом регулировании порядке, в соответствии с установленными нормами работникам, занятым на работах с вредными и (или) опасными условиями труда, а также на работах, выполняемых в особых температурных условиях или связанных с загрязнением; (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 30.12.2008 № 313-ФЗ)

обучение безопасным методам и приемам выполнения работ и оказанию первой помощи пострадавшим на производстве, проведение инструктажа по охране труда, стажировки на рабочем месте и проверки знания требований охраны труда; (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

недопущение к работе лиц, не прошедших в установленном порядке обучение и инструктаж по охране труда, стажировку и проверку знаний требований охраны труда;

организацию контроля за состоянием условий труда на рабочих местах, а также за правильностью применения работниками средств индивидуальной и коллективной защиты;

проведение специальной оценки условий труда в соответствии с законодательством о специальной оценке условий труда; (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

в случаях, предусмотренных трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права, организовывать проведение за счет собственных средств обязательных предварительных (при поступлении на работу) и периодических (в течение трудовой деятельности) медицинских осмотров, других обязательных медицинских осмотров, обязательных психиатрических освидетельствований работников, внеочередных медицинских осмотров, обязательных психиатрических освидетельствований работников по их просьбам в соответствии с медицинскими рекомендациями с сохранением за ними места работы (должности) и среднего заработка на время прохождения указанных медицинских осмотров, обязательных психиатрических освидетельствований; (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 30.11.2011 № 353-ФЗ; от 25.11.2013 № 317-ФЗ)

недопущение работников к исполнению ими трудовых обязанностей без прохождения обязательных медицинских осмотров, обязательных психиатрических освидетельствований, а также в случае медицинских противопоказаний; (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 25.11.2013 № 317-ФЗ)

информирование работников об условиях и охране труда на рабочих местах, о риске повреждения здоровья, предоставляемых им гарантиях, полагающихся им компенсациях и средствах индивидуальной защиты; (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 28.12.2013 № 421-ФЗ)

предоставление федеральным органам исполнительной власти, осуществляющим функции по выработке государственной политики и нормативно-правовому регулированию в сфере труда, федеральному органу исполнительной власти, уполномоченному на осуществление федерального государственного контроля (надзора) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права, другим федеральным органам исполнительной власти, осуществляющим государственный контроль (надзор) в установленной сфере деятельности, органам исполнительной власти субъектов Российской Федерации в области охраны труда, органам профсоюзного контроля за соблюдением трудового законодательства и иных актов, содержащих нормы трудового права, информации и документов, необходимых для осуществления ими своих полномочий; (В редакции федеральных законов от 22.08.2004 № 122-ФЗ, от 30.06.2006 № 90-ФЗ, от 18.07.2011 № 242-ФЗ, от 28.06.2021 № 220-ФЗ)

принятие мер по предотвращению аварийных ситуаций, сохранению жизни и здоровья работников при возникновении таких ситуаций, в том числе по оказанию пострадавшим первой помощи;

расследование и учет в установленном настоящим Кодексом, другими федеральными законами и иными нормативными правовыми актами Российской Федерации порядке несчастных случаев на производстве и профессиональных заболеваний; (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

санитарно-бытовое обслуживание и медицинское обеспечение работников в соответствии с требованиями охраны труда, а также доставку работников, заболевших на рабочем месте, в медицинскую организацию в случае необходимости оказания им неотложной медицинской помощи; (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 25.11.2013 № 317-ФЗ)

беспрепятственный допуск должностных лиц федерального органа исполнительной власти, уполномоченного на осуществление федерального государственного контроля (надзора) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права, других федеральных органов исполнительной власти, осуществляющих государственный контроль (надзор) в установленной сфере деятельности, органов исполнительной власти субъектов Российской Федерации в области охраны труда, органов Фонда социального страхования Российской Федерации, а также представителей органов общественного контроля в целях проведения проверок условий и охраны труда и расследования несчастных случаев на производстве и профессиональных заболеваний; (В редакции федеральных законов от 18.07.2011 № 242-ФЗ, от 28.06.2021 № 220-ФЗ)

выполнение предписаний должностных лиц федерального органа исполнительной власти, уполномоченного на осуществление федерального государственного контроля (надзора) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права, других федеральных органов исполнительной власти, осуществляющих государственный контроль (надзор) в установленной сфере деятельности, и рассмотрение представлений органов общественного контроля в установленные настоящим Кодексом, иными федеральными законами сроки; (В редакции федеральных законов от 22.08.2004 № 122-ФЗ, от 30.06.2006 № 90-ФЗ, от 18.07.2011 № 242-ФЗ, от 28.06.2021 № 220-ФЗ)

обязательное социальное страхование работников от несчастных случаев на производстве и профессиональных заболеваний;

ознакомление работников с требованиями охраны труда;

разработку и утверждение правил и инструкций по охране труда для работников с учетом мнения выборного органа первичной профсоюзной организации или иного уполномоченного работниками органа в порядке, установленном статьей 372 настоящего Кодекса для принятия локальных нормативных актов; (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

наличие комплекта нормативных правовых актов, содержащих требования охраны труда в соответствии со спецификой своей деятельности. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Статья 213. Медицинские осмотры некоторых категорий работников

Работники, занятые на работах с вредными и (или) опасными условиями труда (в том числе на подземных работах), а также на работах, связанных с движением транспорта, проходят обязательные предварительные (при поступлении на работу) и периодические (для лиц в возрасте до 21 года - ежегодные) медицинские осмотры для определения пригодности этих работников для выполнения поручаемой работы и предупреждения профессиональных заболеваний. В соответствии с медицинскими рекомендациями указанные работники проходят внеочередные медицинские осмотры. (В редакции федеральных законов от 22.08.2004 № 122-ФЗ; от 25.11.2013 № 317-ФЗ; от 28.12.2013 № 421-ФЗ)

Работники организаций пищевой промышленности, общественного питания и торговли, водопроводных сооружений, медицинских организаций и детских учреждений, а также некоторых других работодателей проходят указанные медицинские осмотры в целях охраны здоровья населения, предупреждения возникновения и распространения заболеваний. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 25.11.2013 № 317-ФЗ)

Настоящим Кодексом, другими федеральными законами и иными нормативными правовыми актами Российской Федерации для отдельных категорий работников могут устанавливаться обязательные медицинские осмотры в начале рабочего дня (смены), а также в течение и (или) в конце рабочего дня (смены). Время прохождения указанных медицинских осмотров включается в рабочее время. (Часть введена - Федеральный закон от 30.11.2011 № 353-ФЗ; в редакции Федерального закона от 25.11.2013 № 317-ФЗ)

Вредные и (или) опасные производственные факторы и работы, при выполнении которых проводятся обязательные предварительные и периодические медицинские осмотры, порядок проведения таких осмотров определяются уполномоченным Правительством Российской Федерации федеральным органом исполнительной власти. (В редакции Федерального закона от 25.11.2013 № 317-ФЗ)

В случае необходимости по решению органов местного самоуправления у отдельных работодателей могут вводиться дополнительные условия и показания к проведению обязательных медицинских осмотров. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 25.11.2013 № 317-ФЗ)

Федеральными законами и иными нормативными правовыми актами Российской Федерации для отдельных категорий работников медицинскими осмотрами может предусматриваться проведение химико-токсикологических исследований наличия в организме человека наркотических средств, психотропных веществ и их метаболитов. (Часть введена - Федеральный закон от 13.07.2015 № 230-ФЗ)

Работники, осуществляющие отдельные виды деятельности, в том числе связанной с источниками повышенной опасности (с влиянием вредных веществ и неблагоприятных производственных факторов), а также работающие в условиях повышенной опасности, проходят обязательное психиатрическое освидетельствование не реже одного раза в пять лет в порядке, устанавливаемом уполномоченным Правительством Российской Федерации федеральным органом исполнительной власти. (В редакции Федерального закона от 23.07.2008 № 160-ФЗ)

Предусмотренные настоящей статьей медицинские осмотры и психиатрические освидетельствования осуществляются за счет средств работодателя. (Часть введена - Федеральный закон от 22.08.2004 № 122-ФЗ; в редакции Федерального закона от 25.11.2013 № 317-ФЗ)

Статья 213^1^. Соответствие зданий, сооружений, оборудования, технологических процессов и материалов государственным нормативным требованиям охраны труда

Проекты организации строительства (реконструкции) объектов капитального строительства должны соответствовать государственным нормативным требованиям охраны труда. Машины, механизмы и другое производственное оборудование, транспортные средства, технологические процессы, материалы и химические вещества, средства индивидуальной и коллективной защиты работников, в том числе иностранного производства, должны соответствовать государственным нормативным требованиям охраны труда и иметь обязательное подтверждение соответствия в случаях, установленных законодательством Российской Федерации о техническом регулировании.

В производстве запрещается применение вредных и (или) опасных веществ, материалов, продукции, товаров, токсикологическая (санитарно-гигиеническая, медико-биологическая) оценка которых не проводилась.

В случае использования новых или ранее не применявшихся у работодателя вредных и (или) опасных веществ работодатель обязан до начала использования указанных веществ разработать меры по сохранению жизни и здоровья работников.

Требования к измерениям, относящимся к сфере государственного регулирования обеспечения единства измерений при выполнении работ по обеспечению безопасных условий и охраны труда, а также к средствам измерений, применяемым для указанных измерений, устанавливаются в соответствии с законодательством Российской Федерации об обеспечении единства измерений и законодательством Российской Федерации о техническом регулировании.

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 214. Обязанности работника в области охраны труда

Работник обязан:

соблюдать требования охраны труда; (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

правильно применять средства индивидуальной и коллективной защиты;

проходить обучение безопасным методам и приемам выполнения работ и оказанию первой помощи пострадавшим на производстве, инструктаж по охране труда, стажировку на рабочем месте, проверку знаний требований охраны труда; (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

немедленно извещать своего непосредственного или вышестоящего руководителя о любой ситуации, угрожающей жизни и здоровью людей, о каждом несчастном случае, происшедшем на производстве, или об ухудшении состояния своего здоровья, в том числе о проявлении признаков острого профессионального заболевания (отравления);

проходить обязательные предварительные (при поступлении на работу) и периодические (в течение трудовой деятельности) медицинские осмотры, другие обязательные медицинские осмотры, а также проходить внеочередные медицинские осмотры по направлению работодателя в случаях, предусмотренных настоящим Кодексом и иными федеральными законами. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 30.11.2011 № 353-ФЗ; от 25.11.2013 № 317-ФЗ)

Статья 214^1^. Запрет на работу в опасных условиях труда

Работодатель обязан приостановить работы на рабочих местах в случаях, если условия труда на таких рабочих местах по результатам специальной оценки условий труда отнесены к опасному классу условий труда.

Приостановка работ осуществляется до устранения оснований, послуживших установлению опасного класса условий труда.

На время приостановки работ на рабочих местах, указанных в части первой настоящей статьи, работникам, занятым на таких рабочих местах, предоставляются гарантии, установленные частью третьей статьи 216^1^ настоящего Кодекса.

Устранение оснований, послуживших установлению опасного класса условий труда, осуществляется на основе плана мероприятий, который разрабатывает работодатель с учетом мнения выборного органа первичной профсоюзной организации или иного представительного органа работников (при наличии такого представительного органа).

Копия утвержденного работодателем плана мероприятий направляется работодателем в территориальный орган федерального органа исполнительной власти, уполномоченного на проведение федерального государственного контроля (надзора) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права, по месту нахождения работодателя.

Возобновление деятельности работодателя на рабочих местах, указанных в части первой настоящей статьи, допускается только по результатам внеплановой специальной оценки условий труда, подтверждающей снижение класса условий труда.

Установленный настоящей статьей запрет не распространяется на работы, связанные с предотвращением или устранением последствий чрезвычайных ситуаций, а также на отдельные виды работ, перечень которых утверждается Правительством Российской Федерации с учетом мнения Российской трехсторонней комиссии по регулированию социально-трудовых отношений.

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 214^2^. Права работодателя в области охраны труда

Работодатель имеет право:

использовать в целях контроля за безопасностью производства работ приборы, устройства, оборудование и (или) комплексы (системы) приборов, устройств, оборудования, обеспечивающих дистанционную видео-, аудио- или иную фиксацию процессов производства работ, обеспечивать хранение полученной информации;

вести электронный документооборот в области охраны труда;

предоставлять дистанционный доступ к наблюдению за безопасным производством работ, а также к базам электронных документов работодателя в области охраны труда федеральному органу исполнительной власти, уполномоченному на осуществление федерального государственного контроля (надзора) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права, и его территориальным органам (государственным инспекциям труда в субъектах Российской Федерации).

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 215. Соответствие производственных объектов и продукции государственным нормативным требованиям охраны труда

Проекты строительства и реконструкции производственных объектов, машин, механизмов и другого производственного оборудования, технологических процессов должны соответствовать государственным нормативным требованиям охраны труда. Машины, механизмы и другое производственное оборудование, транспортные средства, технологические процессы, материалы и химические вещества, средства индивидуальной и коллективной защиты работников, в том числе иностранного производства, должны соответствовать государственным нормативным требованиям охраны труда и иметь декларацию о соответствии и (или) сертификат соответствия. (В редакции Федерального закона от 22.07.2008 № 157-ФЗ)

(Часть утратила силу - Федеральный закон от 28.12.2013 № 421-ФЗ)

Оценка соответствия проектов строительства, реконструкции производственных объектов требованиям охраны труда осуществляется путем проведения экспертизы проектной документации и осуществления государственного строительного надзора в соответствии с законодательством о градостроительной деятельности. (В редакции федеральных законов от 18.12.2006 № 232-ФЗ; от 18.07.2011 № 243-ФЗ; от 28.11.2011 № 337-ФЗ)

Новые или реконструируемые производственные объекты не могут быть приняты в эксплуатацию без заключений соответствующих федеральных органов исполнительной власти, осуществляющих государственный контроль (надзор) в установленной сфере деятельности. (В редакции Федерального закона от 18.07.2011 № 242-ФЗ)

В производстве запрещается применение вредных или опасных веществ, материалов, продукции, товаров, токсикологическая (санитарно-гигиеническая, медико-биологическая) оценка которых не проводилась. (В редакции Федерального закона от 07.11.2011 № 303-ФЗ)

В случае использования новых или не применявшихся у работодателя ранее вредных или опасных веществ он обязан до начала использования указанных веществ разработать меры по сохранению жизни и здоровья работников. (В редакции Федерального закона от 18.07.2011 № 242-ФЗ)

Требования к измерениям, относящимся к сфере государственного регулирования обеспечения единства измерений при выполнении работ по обеспечению безопасных условий и охраны труда, а также к средствам измерений, применяемым для указанных измерений, устанавливаются в соответствии с законодательством Российской Федерации об обеспечении единства измерений и законодательством Российской Федерации о техническом регулировании. (Часть введена - Федеральный закон от 07.11.2011 № 303-ФЗ)

(Статья в редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Глава 35. ОРГАНИЗАЦИЯ ОХРАНЫ ТРУДА

Статья 216. Государственное управление охраной труда

Государственное управление охраной труда осуществляется Правительством Российской Федерации непосредственно или по его поручению федеральным органом исполнительной власти, осуществляющим функции по выработке государственной политики и нормативно-правовому регулированию в сфере труда, а также другими федеральными органами исполнительной власти в пределах их полномочий. (В редакции федеральных законов от 22.08.2004 № 122-ФЗ; от 30.06.2006 № 90-ФЗ)

(Часть утратила силу - Федеральный закон от 30.06.2006 № 90-ФЗ)

Федеральные органы исполнительной власти, которым предоставлено право осуществлять отдельные функции по нормативно-правовому регулированию, специальные разрешительные, надзорные и контрольные функции в области охраны труда, обязаны согласовывать принимаемые ими решения в области охраны труда, а также координировать свою деятельность с федеральным органом исполнительной власти, осуществляющим функции по нормативно-правовому регулированию в сфере труда. (В редакции федеральных законов от 22.08.2004 № 122-ФЗ; от 30.06.2006 № 90-ФЗ)

Государственное управление охраной труда на территориях субъектов Российской Федерации осуществляется федеральными органами исполнительной власти и органами исполнительной власти субъектов Российской Федерации в области охраны труда в пределах их полномочий. Отдельные полномочия по государственному управлению охраной труда могут быть переданы органам местного самоуправления в порядке и на условиях, которые определяются федеральными законами и законами субъектов Российской Федерации. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

В целях государственного управления охраной труда Правительство Российской Федерации, уполномоченные федеральные органы исполнительной власти:

обеспечивают разработку нормативных правовых актов, определяющих основы государственного управления охраной труда;

разрабатывают федеральные целевые программы улучшения условий и охраны труда и обеспечивают контроль за их выполнением;

устанавливают порядок организации и проведения обучения по охране труда работников, в том числе руководителей организаций, а также работодателей - индивидуальных предпринимателей, проверки знания ими требований охраны труда, а также порядок организации и проведения обучения оказанию первой помощи пострадавшим на производстве, инструктажа по охране труда, стажировки на рабочем месте;

устанавливают порядок осуществления государственной экспертизы условий труда, порядок проведения специальной оценки условий труда; (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

разрабатывают меры экономического стимулирования деятельности работодателей по обеспечению безопасных условий труда;

обеспечивают взаимодействие федеральных органов исполнительной власти, органов исполнительной власти субъектов Российской Федерации, объединений работодателей, профессиональных союзов и их объединений по вопросам реализации государственной политики в области охраны труда;

координируют научно-исследовательские работы в области охраны труда и обеспечивают распространение передового отечественного и зарубежного опыта работы по улучшению условий и охраны труда;

организуют международное сотрудничество в области охраны труда;

исполняют иные полномочия в сфере государственного управления охраной труда в соответствии с федеральными законами и иными нормативными правовыми актами Российской Федерации.

(Часть введена - Федеральный закон от 22.07.2008 № 157-ФЗ)

В целях государственного управления охраной труда органы исполнительной власти субъектов Российской Федерации в области охраны труда:

обеспечивают реализацию на территории субъекта Российской Федерации государственной политики в области охраны труда и федеральных целевых программ улучшения условий и охраны труда;

разрабатывают и утверждают территориальные целевые программы улучшения условий и охраны труда и обеспечивают контроль за их выполнением;

координируют проведение на территории субъекта Российской Федерации в установленном порядке обучения по охране труда работников, в том числе руководителей организаций, а также работодателей - индивидуальных предпринимателей, проверки знания ими требований охраны труда, а также проведение обучения оказанию первой помощи пострадавшим на производстве; (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

осуществляют на территории субъекта Российской Федерации в установленном порядке государственную экспертизу условий труда; (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

организуют сбор и обработку информации о состоянии условий и охраны труда у работодателей, осуществляющих деятельность на территории субъекта Российской Федерации;

исполняют иные полномочия в сфере государственного управления охраной труда, не отнесенные к полномочиям федеральных органов исполнительной власти, в соответствии с законами и иными нормативными правовыми актами субъектов Российской Федерации.

(Часть введена - Федеральный закон от 22.07.2008 № 157-ФЗ)

Статья 216^1^. Государственная экспертиза условий труда

Государственная экспертиза условий труда осуществляется федеральным органом исполнительной власти, уполномоченным на проведение федерального государственного контроля (надзора) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права, и органами исполнительной власти субъектов Российской Федерации в области охраны труда в порядке, установленном уполномоченным Правительством Российской Федерации федеральным органом исполнительной власти. (В редакции федеральных законов от 23.07.2008 № 160-ФЗ, от 18.07.2011 № 242-ФЗ, от 28.06.2021 № 220-ФЗ)

Если документация и материалы для проведения государственной экспертизы условий труда не были представлены лицами, имеющими право на обращение с заявлением о проведении государственной экспертизы условий труда, органы, уполномоченные на проведение государственной экспертизы условий труда, самостоятельно запрашивают указанные документацию и материалы в органах и организациях, в отношении которых проводится государственная экспертиза условий труда, а также в органах, предоставляющих государственные услуги, иных государственных органах, органах местного самоуправления и подведомственных государственным органам или органам местного самоуправления организациях, если указанные документация и материалы находятся в распоряжении таких органов либо организаций в соответствии с нормативными правовыми актами Российской Федерации, нормативными правовыми актами субъектов Российской Федерации, муниципальными правовыми актами. (Часть введена - Федеральный закон от 01.07.2011 № 169-ФЗ)

Государственная экспертиза условий труда осуществляется в целях оценки:

качества проведения специальной оценки условий труда; (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

правильности предоставления работникам гарантий и компенсаций за работу с вредными и (или) опасными условиями труда; (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

(Абзац утратил силу - Федеральный закон от 28.12.2013 № 421-ФЗ)

фактических условий труда работников. (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

Государственная экспертиза условий труда осуществляется на основании определений судебных органов, обращений органов исполнительной власти, работодателей, объединений работодателей, работников, профессиональных союзов, их объединений, иных уполномоченных работниками представительных органов, органов Фонда социального страхования Российской Федерации.

Лица, осуществляющие государственную экспертизу условий труда, имеют право:

в порядке, установленном федеральными законами и иными нормативными правовыми актами Российской Федерации, беспрепятственно при наличии удостоверения установленного образца посещать для осуществления экспертизы любых работодателей (организации независимо от их организационно-правовых форм и форм собственности, а также работодателей - физических лиц);

запрашивать и безвозмездно получать необходимые для осуществления экспертизы документы и другие материалы;

проводить соответствующие наблюдения, измерения и расчеты с привлечением в случае необходимости исследовательских (измерительных) лабораторий, аккредитованных в порядке, установленном федеральными законами и иными нормативными актами Российской Федерации.

Лица, осуществляющие государственную экспертизу условий труда, обязаны:

составлять по результатам экспертизы заключения о соответствии (несоответствии) условий труда государственным нормативным требованиям охраны труда и направлять указанные заключения в суд, органы исполнительной власти, работодателям, в объединения работодателей, работникам, в профессиональные союзы, их объединения, иные уполномоченные работниками представительные органы, органы Фонда социального страхования Российской Федерации;

обеспечивать объективность и обоснованность выводов, изложенных в заключениях;

обеспечивать сохранность документов и других материалов, полученных для осуществления экспертизы, и конфиденциальность содержащихся в них сведений.

(Статья введена - Федеральный закон от 30.06.2006 № 90-ФЗ)

Статья 216^2^. Право работника на получение информации об условиях и охране труда

Каждый работник имеет право на получение актуальной и достоверной информации об условиях и охране труда на его рабочем месте, о существующих профессиональных рисках и их уровнях, а также о мерах по защите от воздействия вредных и (или) опасных производственных факторов, имеющихся на рабочем месте, о предоставляемых ему гарантиях, полагающихся ему компенсациях и средствах индивидуальной защиты, об использовании приборов, устройств, оборудования и (или) комплексов (систем) приборов, устройств, оборудования, обеспечивающих дистанционную видео-, аудио- или иную фиксацию процессов производства работ, в целях контроля за безопасностью производства работ.

Обязанность предоставления указанной в настоящей статье информации возлагается на работодателя, а также на соответствующие государственные органы и общественные организации при наличии у них такой информации.

Работодатель обязан незамедлительно проинформировать работника об отнесении условий труда на его рабочем месте по результатам специальной оценки условий труда к опасному классу условий труда.

Формы (способы) и рекомендации по размещению работодателем информационных материалов в целях информирования работников об их трудовых правах, включая право на безопасные условия и охрану труда, а также примерный перечень таких информационных материалов утверждается федеральным органом исполнительной власти, осуществляющим функции по выработке и реализации государственной политики и нормативно-правовому регулированию в сфере труда.

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 216^3^. Обеспечение права работников на санитарно-бытовое обслуживание

Санитарно-бытовое обслуживание работников в соответствии с требованиями охраны труда возлагается на работодателя. В этих целях работодателем по установленным нормам оборудуются санитарно-бытовые помещения, помещения для приема пищи, комнаты для отдыха в рабочее время и психологической разгрузки, организуются посты для оказания первой помощи, укомплектованные аптечками для оказания первой помощи, устанавливаются аппараты (устройства) для обеспечения работников горячих цехов и участков газированной соленой водой и другое.

Перевозка в медицинские организации или к месту жительства работников, пострадавших в результате несчастного случая на производстве и профессиональных заболеваний, а также по иным медицинским показаниям производится за счет средств работодателя, если иное не предусмотрено настоящим Кодексом, другими федеральными законами и иными нормативными правовыми актами Российской Федерации.

(Статья введена - Федеральный закон от 02.07.2021 № 311-ФЗ, вступает в силу с 1 марта 2022 года)

Статья 217. Служба охраны труда в организации

В целях обеспечения соблюдения требований охраны труда, осуществления контроля за их выполнением у каждого работодателя, осуществляющего производственную деятельность, численность работников которого превышает 50 человек, создается служба охраны труда или вводится должность специалиста по охране труда, имеющего соответствующую подготовку или опыт работы в этой области. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Работодатель, численность работников которого не превышает 50 человек, принимает решение о создании службы охраны труда или введении должности специалиста по охране труда с учетом специфики своей производственной деятельности. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

При отсутствии у работодателя службы охраны труда, штатного специалиста по охране труда их функции осуществляют работодатель - индивидуальный предприниматель (лично), руководитель организации, другой уполномоченный работодателем работник либо организация или специалист, оказывающие услуги в области охраны труда, привлекаемые работодателем по гражданско-правовому договору. Организации, оказывающие услуги в области охраны труда, подлежат обязательной аккредитации, за исключением организаций, проводящих специальную оценку условий труда, порядок аккредитации которых устанавливается законодательством о специальной оценке условий труда. Перечень услуг, для оказания которых необходима аккредитация, правила аккредитации, включающие в себя требования аккредитации, которым должны соответствовать организации, оказывающие услуги в области охраны труда, порядок проведения контроля за деятельностью аккредитованных организаций, порядок приостановления или отзыва аккредитации устанавливаются федеральным органом исполнительной власти, осуществляющим функции по выработке государственной политики и нормативно-правовому регулированию в сфере труда. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 18.07.2011 № 238-ФЗ; от 28.12.2013 № 421-ФЗ)

Структура службы охраны труда в организации и численность работников службы охраны труда определяются работодателем с учетом рекомендаций федерального органа исполнительной власти, осуществляющего функции по нормативно-правовому регулированию в сфере труда. (В редакции Федерального закона от 22.08.2004 № 122-ФЗ)

Статья 218. Комитеты (комиссии) по охране труда

По инициативе работодателя и (или) по инициативе работников либо их представительного органа создаются комитеты (комиссии) по охране труда. В их состав на паритетной основе входят представители работодателя и представители выборного органа первичной профсоюзной организации или иного представительного органа работников. Типовое положение о комитете (комиссии) по охране труда утверждается федеральным органом исполнительной власти, осуществляющим функции по выработке государственной политики и нормативно-правовому регулированию в сфере труда. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Комитет (комиссия) по охране труда организует совместные действия работодателя и работников по обеспечению требований охраны труда, предупреждению производственного травматизма и профессиональных заболеваний, а также организует проведение проверок условий и охраны труда на рабочих местах и информирование работников о результатах указанных проверок, сбор предложений к разделу коллективного договора (соглашения) об охране труда.

Глава 36. ОБЕСПЕЧЕНИЕ ПРАВ РАБОТНИКОВ НА ОХРАНУ ТРУДА

Статья 219. Право работника на труд в условиях, отвечающих требованиям охраны труда

(Наименование в редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Каждый работник имеет право на:

рабочее место, соответствующее требованиям охраны труда;

обязательное социальное страхование от несчастных случаев на производстве и профессиональных заболеваний в соответствии с федеральным законом;

получение достоверной информации от работодателя, соответствующих государственных органов и общественных организаций об условиях и охране труда на рабочем месте, о существующем риске повреждения здоровья, а также о мерах по защите от воздействия вредных и (или) опасных производственных факторов;

отказ от выполнения работ в случае возникновения опасности для его жизни и здоровья вследствие нарушения требований охраны труда, за исключением случаев, предусмотренных федеральными законами, до устранения такой опасности;

обеспечение средствами индивидуальной и коллективной защиты в соответствии с требованиями охраны труда за счет средств работодателя;

обучение безопасным методам и приемам труда за счет средств работодателя;

дополнительное профессиональное образование за счет средств работодателя в случае ликвидации рабочего места вследствие нарушения требований охраны труда; (В редакции Федерального закона от 02.07.2013 № 185-ФЗ)

запрос о проведении проверки условий и охраны труда на его рабочем месте федеральным органом исполнительной власти, уполномоченным на осуществление федерального государственного контроля (надзора) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права, другими федеральными органами исполнительной власти, осуществляющими государственный контроль (надзор) в установленной сфере деятельности, органами исполнительной власти, осуществляющими государственную экспертизу условий труда, а также органами профсоюзного контроля за соблюдением трудового законодательства и иных актов, содержащих нормы трудового права; (В редакции федеральных законов от 22.08.2004 № 122-ФЗ, от 30.06.2006 № 90-ФЗ, от 18.07.2011 № 242-ФЗ, от 28.06.2021 № 220-ФЗ)

обращение в органы государственной власти Российской Федерации, органы государственной власти субъектов Российской Федерации и органы местного самоуправления, к работодателю, в объединения работодателей, а также в профессиональные союзы, их объединения и иные уполномоченные работниками представительные органы по вопросам охраны труда;

личное участие или участие через своих представителей в рассмотрении вопросов, связанных с обеспечением безопасных условий труда на его рабочем месте, и в расследовании происшедшего с ним несчастного случая на производстве или профессионального заболевания;

внеочередной медицинский осмотр в соответствии с медицинскими рекомендациями с сохранением за ним места работы (должности) и среднего заработка во время прохождения указанного медицинского осмотра; (В редакции Федерального закона от 25.11.2013 № 317-ФЗ)

гарантии и компенсации, установленные в соответствии с настоящим Кодексом, коллективным договором, соглашением, локальным нормативным актом, трудовым договором, если он занят на работах с вредными и (или) опасными условиями труда. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 28.12.2013 № 421-ФЗ)

Размеры, порядок и условия предоставления гарантий и компенсаций работникам, занятым на работах с вредными и (или) опасными условиями труда, устанавливаются в порядке, предусмотренном статьями 92, 117 и 147 настоящего Кодекса. (Часть введена - Федеральный закон от 30.06.2006 № 90-ФЗ; в редакции Федерального закона от 28.12.2013 № 421-ФЗ)

Повышенные или дополнительные гарантии и компенсации за работу на работах с вредными и (или) опасными условиями труда могут устанавливаться коллективным договором, локальным нормативным актом с учетом финансово-экономического положения работодателя. (Часть введена - Федеральный закон от 30.06.2006 № 90-ФЗ; в редакции Федерального закона от 28.12.2013 № 421-ФЗ)

В случае обеспечения на рабочих местах безопасных условий труда, подтвержденных результатами специальной оценки условий труда или заключением государственной экспертизы условий труда, гарантии и компенсации работникам не устанавливаются. (Часть введена - Федеральный закон от 30.06.2006 № 90-ФЗ; в редакции Федерального закона от 28.12.2013 № 421-ФЗ)

Статья 220. Гарантии права работников на труд в условиях, соответствующих требованиям охраны труда

Государство гарантирует работникам защиту их права на труд в условиях, соответствующих требованиям охраны труда.

Условия труда, предусмотренные трудовым договором, должны соответствовать требованиям охраны труда.

На время приостановления работ в связи с административным приостановлением деятельности или временным запретом деятельности в соответствии с законодательством Российской Федерации вследствие нарушения государственных нормативных требований охраны труда не по вине работника за ним сохраняются место работы (должность) и средний заработок. На это время работник с его согласия может быть переведен работодателем на другую работу с оплатой труда по выполняемой работе, но не ниже среднего заработка по прежней работе. (В редакции федеральных законов от 09.05.2005 № 45-ФЗ; от 30.06.2006 № 90-ФЗ; от 18.07.2011 № 242-ФЗ)

При отказе работника от выполнения работ в случае возникновения опасности для его жизни и здоровья (за исключением случаев, предусмотренных настоящим Кодексом и иными федеральными законами) работодатель обязан предоставить работнику другую работу на время устранения такой опасности. (В редакции федеральных законов от 09.05.2005 № 45-ФЗ; от 30.06.2006 № 90-ФЗ)

В случае, если предоставление другой работы по объективным причинам работнику невозможно, время простоя работника до устранения опасности для его жизни и здоровья оплачивается работодателем в соответствии с настоящим Кодексом и иными федеральными законами.

В случае необеспечения работника в соответствии с установленными нормами средствами индивидуальной и коллективной защиты работодатель не имеет права требовать от работника исполнения трудовых обязанностей и обязан оплатить возникший по этой причине простой в соответствии с настоящим Кодексом.

Отказ работника от выполнения работ в случае возникновения опасности для его жизни и здоровья вследствие нарушения требований охраны труда либо от выполнения работ с вредными и (или) опасными условиями труда, не предусмотренных трудовым договором, не влечет за собой привлечения его к дисциплинарной ответственности. (В редакции Федерального закона от 28.12.2013 № 421-ФЗ)

В случае причинения вреда жизни и здоровью работника при исполнении им трудовых обязанностей возмещение указанного вреда осуществляется в соответствии с федеральным законом.

В целях предупреждения и устранения нарушений государственных нормативных требований охраны труда государство обеспечивает организацию и осуществление федерального государственного контроля (надзора) за их соблюдением и устанавливает ответственность работодателя и должностных лиц за нарушение указанных требований. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ, от 18.07.2011 № 242-ФЗ, от 28.06.2021 № 220-ФЗ)

Статья 221. Обеспечение работников средствами индивидуальной защиты

На работах с вредными и (или) опасными условиями труда, а также на работах, выполняемых в особых температурных условиях или связанных с загрязнением, работникам бесплатно выдаются прошедшие обязательную сертификацию или декларирование соответствия специальная одежда, специальная обувь и другие средства индивидуальной защиты, а также смывающие и (или) обезвреживающие средства в соответствии с типовыми нормами, которые устанавливаются в порядке, определяемом Правительством Российской Федерации. (В редакции Федерального закона от 30.12.2008 № 313-ФЗ)

Работодатель имеет право с учетом мнения выборного органа первичной профсоюзной организации или иного представительного органа работников и своего финансово-экономического положения устанавливать нормы бесплатной выдачи работникам специальной одежды, специальной обуви и других средств индивидуальной защиты, улучшающие по сравнению с типовыми нормами защиту работников от имеющихся на рабочих местах вредных и (или) опасных факторов, а также особых температурных условий или загрязнения.

Работодатель за счет своих средств обязан в соответствии с установленными нормами обеспечивать своевременную выдачу специальной одежды, специальной обуви и других средств индивидуальной защиты, а также их хранение, стирку, сушку, ремонт и замену.

(Статья в редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Статья 222. Выдача молока и лечебно-профилактического питания

На работах с вредными условиями труда работникам выдаются бесплатно по установленным нормам молоко или другие равноценные пищевые продукты. Выдача работникам по установленным нормам молока или других равноценных пищевых продуктов по письменным заявлениям работников может быть заменена компенсационной выплатой в размере, эквивалентном стоимости молока или других равноценных пищевых продуктов, если это предусмотрено коллективным договором и (или) трудовым договором. (В редакции Федерального закона от 01.10.2007 № 224-ФЗ)

На работах с особо вредными условиями труда предоставляется бесплатно по установленным нормам лечебно-профилактическое питание.

Нормы и условия бесплатной выдачи молока или других равноценных пищевых продуктов, лечебно-профилактического питания, порядок осуществления компенсационной выплаты, предусмотренной частью первой настоящей статьи, устанавливаются в порядке, определяемом Правительством Российской Федерации, с учетом мнения Российской трехсторонней комиссии по регулированию социально-трудовых отношений. (В редакции Федерального закона от 01.10.2007 № 224-ФЗ)

Статья 223. Санитарно-бытовое обслуживание и медицинское обеспечение работников

(Наименование в редакции Федерального закона от 25.11.2013 № 317-ФЗ)

Санитарно-бытовое обслуживание и медицинское обеспечение работников в соответствии с требованиями охраны труда возлагается на работодателя. В этих целях работодателем по установленным нормам оборудуются санитарно-бытовые помещения, помещения для приема пищи, помещения для оказания медицинской помощи, комнаты для отдыха в рабочее время и психологической разгрузки; организуются посты для оказания первой помощи, укомплектованные аптечками для оказания первой помощи; устанавливаются аппараты (устройства) для обеспечения работников горячих цехов и участков газированной соленой водой и другое. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 25.11.2009 № 267-ФЗ; от 25.11.2013 № 317-ФЗ)

Перевозка в медицинские организации или к месту жительства работников, пострадавших от несчастных случаев на производстве и профессиональных заболеваний, а также по иным медицинским показаниям производится транспортными средствами работодателя либо за его счет. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Статья 224. Дополнительные гарантии охраны труда отдельным категориям работников

В случаях, предусмотренных настоящим Кодексом, другими федеральными законами и иными нормативными правовыми актами Российской Федерации, работодатель обязан: соблюдать установленные для отдельных категорий работников ограничения на привлечение их к выполнению работ с вредными и (или) опасными условиями труда, к выполнению работ в ночное время, а также к сверхурочным работам; осуществлять перевод работников, нуждающихся по состоянию здоровья в предоставлении им более легкой работы, на другую работу в соответствии с медицинским заключением, выданным в порядке, установленном федеральными законами и иными нормативными правовыми актами Российской Федерации, с соответствующей оплатой; устанавливать перерывы для отдыха, включаемые в рабочее время; создавать для инвалидов условия труда в соответствии с индивидуальной программой реабилитации; проводить другие мероприятия. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 28.12.2013 № 421-ФЗ)

Статья 225. Обучение в области охраны труда

(Наименование в редакции Федерального закона от 02.07.2013 № 185-ФЗ)

Все работники, в том числе руководители организаций, а также работодатели - индивидуальные предприниматели, обязаны проходить обучение по охране труда и проверку знания требований охраны труда в порядке, установленном уполномоченным Правительством Российской Федерации федеральным органом исполнительной власти с учетом мнения Российской трехсторонней комиссии по регулированию социально-трудовых отношений. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 23.07.2008 № 160-ФЗ)

Для всех поступающих на работу лиц, а также для работников, переводимых на другую работу, работодатель или уполномоченное им лицо обязаны проводить инструктаж по охране труда, организовывать обучение безопасным методам и приемам выполнения работ и оказания первой помощи пострадавшим.

Работодатель обеспечивает обучение лиц, поступающих на работу с вредными и (или) опасными условиями труда, безопасным методам и приемам выполнения работ со стажировкой на рабочем месте и сдачей экзаменов и проведение их периодического обучения по охране труда и проверку знаний требований охраны труда в период работы.

Государство содействует организации обучения по охране труда в организациях, осуществляющих образовательную деятельность. (В редакции Федерального закона от 02.07.2013 № 185-ФЗ)

Государство обеспечивает подготовку специалистов в области охраны труда. (В редакции Федерального закона от 02.07.2013 № 185-ФЗ)

Статья 226. Финансирование мероприятий по улучшению условий и охраны труда

Финансирование мероприятий по улучшению условий и охраны труда осуществляется за счет средств федерального бюджета, бюджетов субъектов Российской Федерации, местных бюджетов, внебюджетных источников в порядке, установленном федеральными законами и иными нормативными правовыми актами Российской Федерации, законами и иными нормативными правовыми актами субъектов Российской Федерации, нормативными правовыми актами органов местного самоуправления. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Финансирование мероприятий по улучшению условий и охраны труда может осуществляться также за счет добровольных взносов организаций и физических лиц. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)

Финансирование мероприятий по улучшению условий и охраны труда работодателями (за исключением государственных унитарных предприятий и федеральных учреждений) осуществляется в размере не менее 0,2 процента суммы затрат на производство продукции (работ, услуг). Типовой перечень ежегодно реализуемых работодателем за счет указанных средств мероприятий по улучшению условий и охраны труда и снижению уровней профессиональных рисков устанавливается федеральным органом исполнительной власти, осуществляющим функции по выработке государственной политики и нормативно-правовому регулированию в сфере труда. (В редакции федеральных законов от 30.06.2006 № 90-ФЗ; от 18.07.2011 № 238-ФЗ)

В отраслях экономики, субъектах Российской Федерации, на территориях, а также у работодателей могут создаваться фонды охраны труда в соответствии с федеральными законами и иными нормативными правовыми актами Российской Федерации, законами и иными нормативными правовыми актами субъектов Российской Федерации, нормативными правовыми актами органов местного самоуправления. (В редакции Федерального закона от 30.06.2006 № 90-ФЗ)
