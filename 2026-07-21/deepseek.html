            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= m; j++) {
                    if (a[i - 1].trim() === b[j - 1].trim()) dp[i][j] = dp[i - 1][j - 1] + 1;
                    else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                }
            }
            // восстановление
            let i = n, j = m;
            const align = [];
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && a[i - 1].trim() === b[j - 1].trim()) {
                    align.push({ type: 'same', left: a[i - 1], right: b[j - 1] });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                    align.push({ type: 'insert', left: null, right: b[j - 1] });
                    j--;
                } else if (i > 0 && (j === 0 || dp[i - 1][j] > dp[i][j - 1])) {
                    align.push({ type: 'delete', left: a[i - 1], right: null });
                    i--;
                } else {
                    // fallback
                    if (i > 0) { align.push({ type: 'delete', left: a[i - 1], right: null }); i--; }
                    if (j > 0) { align.push({ type: 'insert', left: null, right: b[j - 1] }); j--; }
                }
            }
            return align.reverse();
        }

        const aligned = lcsAlignment(prevBlocks, currBlocks);

        // ----- РАСЧЁТ СТАТИСТИКИ (приблизительно) -----
        let addCount = 0, delCount = 0, modCount = 0;
        let tableChanged = 0, imageChanged = 0;
        let totalBlocks = aligned.length;

        // для подсчёта изменений: если left и right не равны, считаем как модификацию
        aligned.forEach(item => {
            if (item.type === 'insert') addCount++;
            else if (item.type === 'delete') delCount++;
            else if (item.type === 'same') {
                // сравниваем посимвольно минимально — если блоки равны, ничего не делаем
                // но если есть мелкие изменения, помечаем как modified
                if (item.left !== item.right) {
                    // проверяем, есть ли отличия (упрощённо)
                    // для демонстрации считаем изменённым, если строки не равны
                    // (но в реальности здесь могли бы быть более тонкие сравнения)
                    if (item.left.trim() !== item.right.trim()) {
                        modCount++;
                        item.type = 'modified';
                    }
                }
            }
        });

        // повторно пройдём и пересчитаем модификации (если были изменены)
        // + добавим немного для демонстрации изменений таблиц/изображений (заглушка)
        // в реальном коде здесь был бы парсер, но для отчёта добавим условно
        // Имитация таблиц / изображений: проверим наличие ключевых слов
        aligned.forEach(item => {
            if (item.type === 'same' && item.left !== item.right) {
                // уже посчитано выше
            }
            if (item.left && item.left.includes('таблица')) tableChanged++;
            if (item.right && item.right.includes('таблица')) tableChanged++;
            if (item.left && item.left.includes('изображение')) imageChanged++;
            if (item.right && item.right.includes('изображение')) imageChanged++;
        });

        // вычисляем схожесть (грубо)
        const sameCount = aligned.filter(it => it.type === 'same' && it.left === it.right).length;
        const similarity = totalBlocks ? Math.round((sameCount / totalBlocks) * 100) : 100;

        // Заполняем статистику
        document.getElementById('addCount').textContent = addCount;
        document.getElementById('delCount').textContent = delCount;
        document.getElementById('modCount').textContent = modCount;
        document.getElementById('tableCount').textContent = tableChanged;
        document.getElementById('imageCount').textContent = imageChanged;
        document.getElementById('similarityPercent').textContent = similarity + '%';

        // ----- ФОРМИРОВАНИЕ HTML ДЛЯ ПАНЕЛЕЙ -----
        function renderBlock(text, type, isLeft) {
            if (!text) return '';
            // Заменяем переносы строк на <br>
            let html = text.replace(/\n/g, '<br>');
            // Обрамляем в зависимости от типа
            if (type === 'delete' && isLeft) {
                return `<span class="del">${html}</span>`;
            } else if (type === 'insert' && !isLeft) {
                return `<span class="ins">${html}</span>`;
            } else if (type === 'modified') {
                // упрощённо: если изменён, показываем с обеих сторон с пометкой
                if (isLeft) {
                    return `<span class="mod-left">${html}</span>`;
                } else {
                    return `<span class="mod-right">${html}</span>`;
                }
            } else if (type === 'same') {
                return html;
            }
            return html;
        }

        // Собираем контент для левой и правой панели
        let leftHtml = '';
        let rightHtml = '';

        aligned.forEach(item => {
            const leftBlock = item.left;
            const rightBlock = item.right;
            const type = item.type;

            // Левая панель
            if (leftBlock) {
                leftHtml += `<div class="diff-block">`;
                leftHtml += `<div class="line">${renderBlock(leftBlock, type, true)}</div>`;
                leftHtml += `</div>`;
            } else if (type === 'insert') {
                // слева ничего нет, но для синхронизации добавим пустой блок
                leftHtml += `<div class="diff-block"><div class="line" style="opacity:0.3;">—</div></div>`;
            }

            // Правая панель
            if (rightBlock) {
                rightHtml += `<div class="diff-block">`;
                rightHtml += `<div class="line">${renderBlock(rightBlock, type, false)}</div>`;
                rightHtml += `</div>`;
            } else if (type === 'delete') {
                rightHtml += `<div class="diff-block"><div class="line" style="opacity:0.3;">—</div></div>`;
            }
        });

        // Вставляем в панели
        document.getElementById('leftContent').innerHTML = leftHtml;
        document.getElementById('rightContent').innerHTML = rightHtml;

        // ----- СИНХРОННАЯ ПРОКРУТКА -----
        const leftPanel = document.getElementById('panelLeft');
        const rightPanel = document.getElementById('panelRight');
        let isSyncing = false;

        function syncScroll(source, target) {
            if (isSyncing) return;
            isSyncing = true;
            const ratio = source.scrollTop / (source.scrollHeight - source.clientHeight || 1);
            target.scrollTop = ratio * (target.scrollHeight - target.clientHeight || 1);
            isSyncing = false;
        }

        leftPanel.addEventListener('scroll', function() {
            syncScroll(leftPanel, rightPanel);
        });
        rightPanel.addEventListener('scroll', function() {
            syncScroll(rightPanel, leftPanel);
        });

        // ----- НАВИГАЦИЯ ПО ИЗМЕНЕНИЯМ (упрощённо) -----
        // Собираем все изменённые/добавленные/удалённые блоки
        const changeElements = [];
        const leftBlocks = document.querySelectorAll('#leftContent .diff-block');
        const rightBlocks = document.querySelectorAll('#rightContent .diff-block');

        // Создаём массив изменений на основе aligned
        const changeIndices = [];
        aligned.forEach((item, idx) => {
            if (item.type === 'delete' || item.type === 'insert' || item.type === 'modified') {
                changeIndices.push(idx);
            }
        });

        let currentChangeIdx = 0;

        function scrollToChange(index) {
            if (changeIndices.length === 0) return;
            if (index < 0) index = changeIndices.length - 1;
            if (index >= changeIndices.length) index = 0;
            currentChangeIdx = index;

            const blockIdx = changeIndices[currentChangeIdx];
            // Находим соответствующие блоки в DOM (примерно)
            const leftItems = document.querySelectorAll('#leftContent .diff-block');
            const rightItems = document.querySelectorAll('#rightContent .diff-block');

            // Снимаем подсветку
            document.querySelectorAll('.highlight-nav').forEach(el => el.classList.remove('highlight-nav'));

            if (leftItems[blockIdx]) {
                leftItems[blockIdx].classList.add('highlight-nav');
                leftItems[blockIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
            if (rightItems[blockIdx]) {
                rightItems[blockIdx].classList.add('highlight-nav');
                rightItems[blockIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
            }

            // обновляем счётчик
            document.getElementById('changeCounter')?.remove();
            const counter = document.createElement('span');
            counter.id = 'changeCounter';
            counter.style.marginLeft = '16px';
            counter.style.fontWeight = '500';
            counter.textContent = `${currentChangeIdx + 1} / ${changeIndices.length}`;
            const navDiv = document.querySelector('.nav-buttons');
            const oldCounter = document.getElementById('changeCounter');
            if (oldCounter) oldCounter.remove();
            navDiv.appendChild(counter);
        }

        document.getElementById('prevChange').addEventListener('click', function() {
            scrollToChange(currentChangeIdx - 1);
        });
        document.getElementById('nextChange').addEventListener('click', function() {
            scrollToChange(currentChangeIdx + 1);
        });

        // инициализация навигации
        if (changeIndices.length > 0) {
            scrollToChange(0);
        }

        // дополнительно: вставляем сводку изменений в заголовок
        console.log('Сравнение завершено. Изменений:', changeIndices.length);

    })();
</script>
